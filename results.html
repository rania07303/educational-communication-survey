<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج استبيان: عوائق التواصل التربوي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep:#0F4C4C;
    --teal:#146464;
    --teal-light:#e6efee;
    --amber:#C98A3E;
    --amber-light:#f6e9d8;
    --cream:#FBF8F1;
    --ink:#22302E;
    --ink-soft:#5a6b68;
    --line:#dbe3e0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    font-family:'Tajawal',sans-serif;
    color:var(--ink);
    line-height:1.9;
  }
  header{
    background:linear-gradient(180deg,var(--teal-deep),var(--teal));
    color:#fff;
    padding:44px 20px 36px;
    text-align:center;
  }
  header .eyebrow{
    font-size:12.5px;
    letter-spacing:.12em;
    color:var(--amber-light);
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:8px;
  }
  header h1{
    font-family:'Amiri',serif;
    font-size:clamp(22px,3.5vw,32px);
    margin:0;
  }
  .wrap{
    max-width:760px;
    margin:-18px auto 60px;
    padding:0 18px;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:0 10px 30px -18px rgba(15,76,76,.35);
    padding:28px 26px;
    margin-bottom:20px;
  }
  .section-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .section-title h2{
    font-family:'Amiri',serif;
    font-size:18px;
    color:var(--teal-deep);
    margin:0;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;
  }
  .result-item{margin-bottom:18px;}
  .result-item:last-child{margin-bottom:0;}
  .result-q{font-size:13.5px;margin-bottom:7px;}
  .result-bar-track{
    background:var(--teal-light);
    border-radius:6px;
    height:20px;
    overflow:hidden;
  }
  .result-bar-fill{
    background:linear-gradient(90deg,var(--teal),var(--teal-deep));
    height:100%;
    display:flex;
    align-items:center;
    padding-inline-start:8px;
  }
  .result-bar-fill span{color:#fff;font-size:11px;font-weight:700;}
  .breakdown-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:8px;
  }
  .breakdown-chip{
    font-size:11px;
    padding:4px 9px;
    border-radius:12px;
    font-weight:700;
    white-space:nowrap;
  }
  .chip-5{background:#0F4C4C; color:#fff;}
  .chip-4{background:#3d8080; color:#fff;}
  .chip-3{background:#e6efee; color:#22302E;}
  .chip-2{background:#f0c9a0; color:#5a3c1a;}
  .chip-1{background:#C98A3E; color:#fff;}
  .demo-pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .demo-pill{
    background:var(--amber-light);
    color:#7a5321;
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:16px;
  }
  .open-answer{
    background:var(--teal-light);
    border-radius:8px;
    padding:10px 14px;
    font-size:13px;
    margin-bottom:8px;
  }
  .empty-note, .loading-note{
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    padding:24px;
  }
  .refresh-btn{
    display:block;
    margin:0 auto 24px;
    background:var(--teal-deep);
    color:#fff;
    border:none;
    padding:11px 24px;
    border-radius:20px;
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
  }
  .refresh-btn:hover{background:var(--teal);}
  .count-badge{
    display:inline-block;
    background:var(--teal-deep);
    color:#fff;
    font-weight:700;
    font-size:13px;
    padding:5px 14px;
    border-radius:14px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">لوحة خاصة</div>
  <h1>نتائج استبيان: عوائق التواصل التربوي وسبل معالجتها</h1>
</header>

<div class="wrap">
  <button class="refresh-btn" id="refreshBtn">تحديث النتائج</button>
  <div class="card">
