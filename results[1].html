<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج استبيان: عوائق التواصل التربوي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep:#0F4C4C;
    --teal:#146464;
    --teal-light:#e6efee;
    --amber:#C98A3E;
    --amber-light:#f6e9d8;
    --cream:#FBF8F1;
    --ink:#22302E;
    --ink-soft:#5a6b68;
    --line:#dbe3e0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    font-family:'Tajawal',sans-serif;
    color:var(--ink);
    line-height:1.9;
  }
  header{
    background:linear-gradient(180deg,var(--teal-deep),var(--teal));
    color:#fff;
    padding:44px 20px 36px;
    text-align:center;
  }
  header .eyebrow{
    font-size:12.5px;
    letter-spacing:.12em;
    color:var(--amber-light);
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:8px;
  }
  header h1{
    font-family:'Amiri',serif;
    font-size:clamp(22px,3.5vw,32px);
    margin:0;
  }
  .wrap{
    max-width:760px;
    margin:-18px auto 60px;
    padding:0 18px;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:0 10px 30px -18px rgba(15,76,76,.35);
    padding:28px 26px;
    margin-bottom:20px;
  }
  .section-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .section-title h2{
    font-family:'Amiri',serif;
    font-size:18px;
    color:var(--teal-deep);
    margin:0;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;
  }
  .result-item{margin-bottom:18px;}
  .result-item:last-child{margin-bottom:0;}
  .result-q{font-size:13.5px;margin-bottom:7px;}
  .result-bar-track{
    background:var(--teal-light);
    border-radius:6px;
    height:20px;
    overflow:hidden;
  }
  .result-bar-fill{
    background:linear-gradient(90deg,var(--teal),var(--teal-deep));
    height:100%;
    display:flex;
    align-items:center;
    padding-inline-start:8px;
  }
  .result-bar-fill span{color:#fff;font-size:11px;font-weight:700;}
  .demo-pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .demo-pill{
    background:var(--amber-light);
    color:#7a5321;
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:16px;
  }
  .open-answer{
    background:var(--teal-light);
    border-radius:8px;
    padding:10px 14px;
    font-size:13px;
    margin-bottom:8px;
  }
  .empty-note, .loading-note{
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    padding:24px;
  }
  .refresh-btn{
    display:block;
    margin:0 auto 24px;
    background:var(--teal-deep);
    color:#fff;
    border:none;
    padding:11px 24px;
    border-radius:20px;
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
  }
  .refresh-btn:hover{background:var(--teal);}
  .count-badge{
    display:inline-block;
    background:var(--teal-deep);
    color:#fff;
    font-weight:700;
    font-size:13px;
    padding:5px 14px;
    border-radius:14px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">لوحة خاصة</div>
  <h1>نتائج استبيان: عوائق التواصل التربوي وسبل معالجتها</h1>
</header>

<div class="wrap">
  <button class="refresh-btn" id="refreshBtn">تحديث النتائج</button>
  <div class="card">
    <div class="section-title"><span class="dot"></span><h2>ملخص المشاركة</h2></div>
    <p id="resultsCount" class="loading-note">جارٍ التحميل...</p>
  </div>
  <div id="resultsBody"></div>
</div>

<script>
const sections = {
  sectionMعلم: {
    title: 'عوائق متعلقة بالمعلم',
    prefix: "معلم",
    items: [
      "يجد بعض المعلمين صعوبة في تبسيط المحتوى العلمي بما يناسب مستوى المتعلمين.",
      "يميل بعض المعلمين إلى أسلوب تواصل تسلطي يحد من تفاعل المتعلمين.",
      "ضعف المهارات اللغوية أو التعبيرية لدى بعض المعلمين يؤثر على وضوح الرسالة التربوية.",
      "قلة استخدام أساليب التواصل غير اللفظي (تعابير الوجه، الإيماءات) لتعزيز الفهم.",
      "انشغال المعلم بإنهاء البرنامج الدراسي يقلل من وقت التفاعل والحوار مع المتعلمين."
    ]
  },
  sectionMتعلم: {
    title: 'عوائق متعلقة بالمتعلم',
    prefix: "متعلم",
    items: [
      "يتردد بعض المتعلمين في طرح الأسئلة أو التعبير عن آرائهم خوفًا من التقييم السلبي.",
      "ضعف الدافعية لدى بعض المتعلمين يقلل من تفاعلهم مع الرسائل التربوية.",
      "الفروق الفردية بين المتعلمين (المعرفية والنفسية) تعيق التواصل الفعّال داخل القسم.",
      "اختلاف اللغة أو اللهجة بين المعلم والمتعلم يسبب سوء فهم أحيانًا."
    ]
  },
  sectionBiaa: {
    title: 'عوائق البيئة والإدارة المدرسية',
    prefix: "بيئة",
    items: [
      "اكتظاظ الأقسام يصعّب التواصل الفردي بين المعلم وكل متعلم.",
      "ضعف التنسيق بين الإدارة المدرسية والمعلمين يؤثر سلبًا على مناخ التواصل.",
      "غياب فضاءات مناسبة للحوار والتوجيه خارج الحصص الدراسية.",
      "ضغط الجدول الزمني والحصص يحد من فرص التواصل التربوي الفعّال.",
      "ضعف إشراك أولياء التلاميذ في متابعة التواصل التربوي داخل المؤسسة."
    ]
  },
  sectionTech: {
    title: 'عوائق تكنولوجية ومادية',
    prefix: "تقني",
    items: [
      "نقص الوسائل التعليمية والتكنولوجية يحد من تنويع أساليب التواصل.",
      "ضعف تكوين المعلمين في استخدام الوسائط الرقمية في التواصل التربوي.",
      "غياب أو ضعف الربط بالإنترنت في بعض المؤسسات يعيق التواصل عن بعد.",
      "الاعتماد شبه الكلي على الطريقة التلقينية يقلل من فرص التفاعل."
    ]
  },
  sectionSolutions: {
    title: 'سبل معالجة عوائق التواصل التربوي',
    prefix: "حل",
    items: [
      "تكوين المعلمين دوريًا في مهارات التواصل التربوي والإنصات الفعّال.",
      "تقليص عدد المتعلمين في القسم الواحد لتحسين التفاعل الفردي.",
      "تفعيل التواصل التشاركي بين المعلم والمتعلم وأولياء الأمور.",
      "توفير وسائل تعليمية وتقنية حديثة تدعم التفاعل داخل القسم.",
      "تنويع أساليب التقويم لتشجيع المتعلمين على التعبير دون خوف.",
      "تعزيز التنسيق بين الإدارة التربوية والمعلمين حول قضايا التواصل."
    ]
  }
};

// ⚠️ ضعي هنا نفس رابط تطبيق الويب المستخدم في ملف الاستبيان (ينتهي بـ /exec)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkx9RTyoDYPiA2BykPXJt8mbbn7dnPK0j3VyKD0jQFuUjHjI5noWa9sPlPEfmYnZSd/exec";

async function loadResults(){
  const resultsBody = document.getElementById('resultsBody');
  const resultsCount = document.getElementById('resultsCount');
  resultsBody.innerHTML = '';
  resultsCount.textContent = 'جارٍ التحميل...';
  resultsCount.className = 'loading-note';

  let responses = [];
  try{
    const res = await fetch(SCRIPT_URL);
    responses = await res.json();
  }catch(err){
    resultsCount.innerHTML = 'تعذر تحميل النتائج تلقائيًا (قد يمنع المتصفح القراءة من نطاق مختلف).<br>يمكنك دائمًا رؤية كل الإجابات مباشرة داخل جدول Google Sheet الخاص بك.';
    return;
  }

  if(!responses || responses.length === 0){
    resultsCount.innerHTML = 'لا توجد إجابات مسجلة حتى الآن.';
    return;
  }

  resultsCount.innerHTML = `عدد المشاركين حتى الآن: <span class="count-badge">${responses.length}</span>`;

  // Demographics
  const demoCard = document.createElement('div');
  demoCard.className = 'card';
  const genderCounts = {};
  const stageCounts = {};
  const expCounts = {};
  responses.forEach(r=>{
    if(r.gender) genderCounts[r.gender] = (genderCounts[r.gender]||0)+1;
    if(r.stage) stageCounts[r.stage] = (stageCounts[r.stage]||0)+1;
    if(r.experience) expCounts[r.experience] = (expCounts[r.experience]||0)+1;
  });
  let demoHtml = '<div class="section-title"><span class="dot"></span><h2>البيانات العامة للمشاركين</h2></div>';
  const buildPills = (obj)=> Object.entries(obj).map(([k,v])=>`<span class="demo-pill">${k}: ${v}</span>`).join('');
  demoHtml += `<div class="demo-pill-row">${buildPills(genderCounts)}</div>`;
  demoHtml += `<div class="demo-pill-row">${buildPills(stageCounts)}</div>`;
  demoHtml += `<div class="demo-pill-row">${buildPills(expCounts)}</div>`;
  demoCard.innerHTML = demoHtml;
  resultsBody.appendChild(demoCard);

  // Per-section averages, sorted descending within each section to highlight biggest obstacles
  Object.entries(sections).forEach(([_, sec])=>{
    const card = document.createElement('div');
    card.className = 'card';
    let html = `<div class="section-title"><span class="dot"></span><h2>${sec.title}</h2></div>`;

    const computed = sec.items.map((text, idx)=>{
      const name = `${sec.prefix}_${idx+1}`;
      let sum = 0, count = 0;
      responses.forEach(r=>{
        if(r[name]){ sum += parseInt(r[name],10); count++; }
      });
      const avg = count > 0 ? (sum/count) : 0;
      return {text, avg};
    });

    computed.forEach(({text, avg})=>{
      const pct = (avg/5)*100;
      html += `
        <div class="result-item">
          <div class="result-q">${text}</div>
          <div class="result-bar-track">
            <div class="result-bar-fill" style="width:${pct}%;">
              <span>${avg.toFixed(2)} / 5</span>
            </div>
          </div>
        </div>
      `;
    });
    card.innerHTML = html;
    resultsBody.appendChild(card);
  });

  // Open suggestions
  const openAnswers = responses.filter(r=>r.openSuggestion && r.openSuggestion.trim() !== '');
  const openCard = document.createElement('div');
  openCard.className = 'card';
  let openHtml = '<div class="section-title"><span class="dot"></span><h2>اقتراحات المشاركين</h2></div>';
  if(openAnswers.length === 0){
    openHtml += '<div class="empty-note">لا توجد اقتراحات مكتوبة بعد.</div>';
  } else {
    openAnswers.forEach(r=>{
      openHtml += `<div class="open-answer">${r.openSuggestion}</div>`;
    });
  }
  openCard.innerHTML = openHtml;
  resultsBody.appendChild(openCard);
}

document.getElementById('refreshBtn').addEventListener('click', loadResults);
loadResults();
</script>

</body>
</html>
